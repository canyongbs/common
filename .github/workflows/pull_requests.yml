name: Code Checks

on:
    pull_request:
    merge_group:
        types: [checks_requested]

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    enforce-copyright:
        name: Enforce Copyright
        runs-on: ubuntu-22.04

        permissions:
            contents: read

        timeout-minutes: 10

        steps:
            - name: Checkout code | Internal
              if: ${{ github.event_name == 'merge_group' || github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]' }}
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.PAT }} # zizmor: ignore[secrets-outside-env]
                  persist-credentials: true # zizmor: ignore[artipacked] -- credentials needed for git push

            - name: Checkout code | External
              if: ${{ github.event_name != 'merge_group' && github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.login == 'dependabot[bot]' }}
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.head_ref }}
                  persist-credentials: false

            - name: Set up Ruby
              uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0

            - name: Run Ruby Script
              run: ruby ./copyright.rb

            - name: Commit changes
              if: ${{ github.event_name != 'merge_group' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]' }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet || (git commit -m "chore: fix enforcement of copyright on all files" && git push)

            - name: Check for changes
              if: ${{ github.event_name == 'merge_group' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.login == 'dependabot[bot]' }}
              uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20.0.4
              with:
                  fail-if-changed: 'true'

    fix-code-style:
        name: Fix Code Style
        runs-on: ubuntu-22.04

        permissions:
            contents: read

        timeout-minutes: 10

        needs: [enforce-copyright]

        steps:
            - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.4'
                  coverage: none

            - name: Checkout code | Internal
              if: ${{ github.event_name == 'merge_group' || github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]' }}
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.PAT }} # zizmor: ignore[secrets-outside-env]
                  persist-credentials: true # zizmor: ignore[artipacked] -- credentials needed for git push

            - name: Checkout code | External
              if: ${{ github.event_name != 'merge_group' && github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.login == 'dependabot[bot]' }}
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Setup Dependencies
              uses: ./.github/actions/composer-dependency-setup

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'
            - run: npm install

            - name: Cache PHP CS Fixer
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: .php-cs-fixer.cache
                  key: ${{ runner.OS }}-${{ github.repository }}-phpcsfixer-${{ github.run_id }}
                  restore-keys: |
                      ${{ runner.OS }}-${{ github.repository }}-phpcsfixer-

            - name: Cache Prettier
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ./node_modules/.cache/prettier/.prettier-cache
                  key: ${{ runner.OS }}-${{ github.repository }}-prettier-${{ github.run_id }}
                  restore-keys: |
                      ${{ runner.OS }}-${{ github.repository }}-prettier-

            - name: Run Formatters
              run: composer format

            - name: Commit changes
              if: ${{ github.event_name != 'merge_group' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]' }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet || (git commit -m "chore: fix code style" && git push)

            - name: Check for changes
              if: ${{ github.event_name == 'merge_group' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.login == 'dependabot[bot]' }}
              uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20.0.4
              with:
                  fail-if-changed: 'true'

    lint:
        name: Lint
        runs-on: ubuntu-22.04

        permissions:
            contents: read

        timeout-minutes: 15

        needs: [enforce-copyright, fix-code-style]

        steps:
            - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.4'
                  coverage: none
                  extensions: gd, gmp, redis

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  persist-credentials: false

            - name: Setup Dependencies
              uses: ./.github/actions/composer-dependency-setup

            - name: 'Restore result cache'
              uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: tmp
                  key: 'phpstan-result-cache-${{ github.run_id }}'
                  restore-keys: |
                      phpstan-result-cache-

            - name: Linting
              run: ./vendor/bin/phpstan analyse --configuration phpstan-ci.neon --no-progress

            - name: 'Save result cache'
              uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              if: ${{ !cancelled() }}
              with:
                  path: tmp
                  key: 'phpstan-result-cache-${{ github.run_id }}'

    test:
        name: Test
        runs-on: ubuntu-22.04

        permissions:
            contents: read

        timeout-minutes: 15

        needs: [enforce-copyright, fix-code-style]

        steps:
            - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: '8.4'
                  coverage: none
                  extensions: gd, gmp, redis, mailparse

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  persist-credentials: false

            - name: Setup Dependencies
              uses: ./.github/actions/composer-dependency-setup

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'
            - run: npm install

            - name: Execute tests
              run: ./vendor/bin/pest --configuration phpunit.xml --parallel
